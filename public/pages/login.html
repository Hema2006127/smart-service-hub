<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXBANK — دخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/ocean.css">
  <link rel="stylesheet" href="/shared/light.css">
  <style>
    html, body { width:100%; min-height:100%; overflow-y:auto; }
    body { font-family:'Tajawal',sans-serif; background:#0a0a0f; color:#c9a84c; }

    /* ── ANIMATED BACKGROUND ── */
    .mf-root {
      font-family:'Tajawal',sans-serif;
      direction:rtl;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 16px 40px;
    }
    .mf-bg { position:absolute; inset:0; background:#080810; overflow:hidden; }

    /* Rain */
    .rain-canvas { position:absolute; inset:0; pointer-events:none; opacity:0.35; }

    /* Fog */
    .fog { position:absolute; left:-100%; width:300%; border-radius:50%; pointer-events:none; }
    .fog1 { bottom:15%; height:80px; background:rgba(20,20,40,0.6); animation:fogDrift 18s linear infinite; }
    .fog2 { bottom:22%; height:50px; background:rgba(15,15,35,0.5); animation:fogDrift 26s linear infinite reverse; animation-delay:-8s; }

    /* Lamp post */
    .lamp-post { position:absolute; bottom:0; display:flex; flex-direction:column; align-items:center; }
    .lp-left { left:6%; }
    .lp-right { right:6%; }
    .lp-pole { width:3px; height:110px; background:#1a1a2e; }
    .lp-arm { width:28px; height:3px; background:#1a1a2e; position:relative; }
    .lp-arm::after { content:''; position:absolute; top:-10px; left:0; width:3px; height:10px; background:#1a1a2e; }
    .lp-globe { width:14px; height:14px; border-radius:50%; background:#c9a84c; position:absolute; top:-18px; left:-6px; box-shadow:0 0 12px 6px rgba(201,168,76,0.35),0 0 30px 12px rgba(201,168,76,0.12); animation:lampFlicker 4s ease-in-out infinite; }
    .lp-cone { position:absolute; top:4px; left:-20px; width:0; height:0; border-left:22px solid transparent; border-right:22px solid transparent; border-top:40px solid rgba(201,168,76,0.08); animation:lampFlicker 4s ease-in-out infinite; }

    /* Moon */
    .moon { position:absolute; top:6%; right:12%; width:48px; height:48px; border-radius:50%; background:#d4c472; box-shadow:0 0 20px 8px rgba(212,196,114,0.2),0 0 60px 20px rgba(212,196,114,0.07); animation:moonGlow 6s ease-in-out infinite; }
    .moon-crater { position:absolute; border-radius:50%; background:#c8b860; }

    /* Smoke */
    .smoke-wrap { position:absolute; bottom:140px; }
    .smoke-wrap.sw1 { left:22%; }
    .smoke-wrap.sw2 { left:58%; }
    .smoke-puff { position:absolute; bottom:0; border-radius:50%; background:rgba(60,60,80,0.5); animation:smokePuff 3s ease-out infinite; }

    /* Bats */
    .bat { position:absolute; opacity:0.6; animation:batFly linear infinite; }
    .bat-wing { display:inline-block; width:10px; height:4px; border-top:2px solid #2a2a4a; border-radius:50% 50% 0 0; margin:0 1px; }

    /* Wanted poster */
    .wanted { position:absolute; top:5%; left:3%; width:64px; background:#d4b896; border:2px solid #8b6914; padding:5px 4px; transform:rotate(-3deg); box-shadow:2px 2px 8px rgba(0,0,0,0.6); }
    .wanted-title { font-family:'Playfair Display',serif; font-size:7px; font-weight:900; color:#5a1a0a; text-align:center; letter-spacing:1px; border-bottom:1px solid #8b6914; margin-bottom:3px; }
    .wanted-face { width:100%; height:36px; background:#c4a882; border:1px solid #9a7a50; display:flex; align-items:center; justify-content:center; margin-bottom:3px; }
    .wanted-sub { font-size:5px; color:#6a3a18; text-align:center; font-weight:700; letter-spacing:0.5px; }

    /* Car */
    .car-wrap { position:absolute; bottom:0; animation:carDrive 22s linear infinite; }
    .car-body { width:90px; height:28px; background:#0d0d1a; border:1px solid #2a2a3e; border-radius:4px 12px 4px 4px; position:relative; }
    .car-roof { position:absolute; top:-16px; left:18px; width:52px; height:16px; background:#080814; border:1px solid #1e1e30; border-radius:8px 8px 0 0; }
    .car-wheel { position:absolute; bottom:-7px; width:14px; height:14px; border-radius:50%; background:#050508; border:2px solid #333355; }
    .car-wl { left:10px; }
    .car-wr { right:10px; }
    .car-headlight { position:absolute; right:-4px; top:8px; width:8px; height:6px; background:#c9a84c; border-radius:0 2px 2px 0; box-shadow:0 0 10px 5px rgba(201,168,76,0.25),0 0 30px 10px rgba(201,168,76,0.1); }

    .city-svg { position:absolute; bottom:0; left:0; width:100%; }

    /* Keyframes */
    @keyframes fogDrift { from{transform:translateX(0)} to{transform:translateX(33.3%)} }
    @keyframes lampFlicker { 0%,100%{opacity:1} 92%{opacity:0.7} 94%{opacity:0.3} 96%{opacity:0.9} }
    @keyframes moonGlow { 0%,100%{box-shadow:0 0 20px 8px rgba(212,196,114,0.2),0 0 60px 20px rgba(212,196,114,0.07)} 50%{box-shadow:0 0 30px 12px rgba(212,196,114,0.32),0 0 80px 30px rgba(212,196,114,0.12)} }
    @keyframes smokePuff { 0%{transform:translateY(0) scale(0.5);opacity:0.7} 100%{transform:translateY(-60px) scale(2.5);opacity:0} }
    @keyframes batFly { 0%{left:-5%;top:15%} 25%{top:8%} 50%{top:18%} 75%{top:10%} 100%{left:110%;top:12%} }
    @keyframes carDrive { from{right:-120px} to{right:110%} }
    @keyframes shimmerCard { 0%,60%{transform:translateX(-200%)} 100%{transform:translateX(300%)} }
    @keyframes borderBlink { 0%,100%{border-color:rgba(201,168,76,0.35)} 50%{border-color:rgba(201,168,76,0.7)} }
    @keyframes titleReveal { from{opacity:0;letter-spacing:12px} to{opacity:1;letter-spacing:3px} }
    @keyframes cardIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes roleSlide { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    /* ── MAIN CARD ── */
    .mf-card {
      position:relative;
      z-index:20;
      width:100%;
      max-width:360px;
      background:#0d0d16;
      border:1px solid rgba(201,168,76,0.35);
      padding:30px 28px 26px;
      animation:cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both, borderBlink 4s ease-in-out 1s infinite;
    }
    .mf-card::before { content:''; position:absolute; top:4px; left:4px; right:4px; bottom:4px; border:1px solid rgba(201,168,76,0.12); pointer-events:none; }
    .mf-card::after { content:''; position:absolute; top:0; left:-100%; right:auto; bottom:0; width:60%; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.04),transparent); animation:shimmerCard 5s ease-in-out 2s infinite; pointer-events:none; }

    /* Corner ornaments */
    .corner { position:absolute; width:16px; height:16px; border-color:rgba(201,168,76,0.6); border-style:solid; }
    .c-tl { top:8px; left:8px; border-width:1px 0 0 1px; }
    .c-tr { top:8px; right:8px; border-width:1px 1px 0 0; }
    .c-bl { bottom:8px; left:8px; border-width:0 0 1px 1px; }
    .c-br { bottom:8px; right:8px; border-width:0 1px 1px 0; }

    /* Header */
    .mf-header { text-align:center; margin-bottom:22px; }
    .mf-emblem { width:52px; height:52px; border-radius:50%; background:#0a0a12; border:1px solid rgba(201,168,76,0.5); margin:0 auto 10px; display:flex; align-items:center; justify-content:center; position:relative; font-size:22px; }
    .mf-emblem::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:1px solid rgba(201,168,76,0.18); }
    .mf-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:900; color:#c9a84c; letter-spacing:3px; animation:titleReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s both; text-shadow:0 0 20px rgba(201,168,76,0.3); }
    .mf-divider { display:flex; align-items:center; gap:8px; margin:8px 0; }
    .mf-line { flex:1; height:1px; background:rgba(201,168,76,0.25); }
    .mf-diamond { width:6px; height:6px; background:#c9a84c; transform:rotate(45deg); opacity:0.7; }
    .mf-subtitle { font-size:10px; color:rgba(201,168,76,0.55); letter-spacing:2px; text-transform:uppercase; }

    /* Role selector */
    .mf-roles { display:flex; gap:1px; margin-bottom:20px; border:1px solid rgba(201,168,76,0.2); background:rgba(201,168,76,0.05); animation:roleSlide 0.6s 0.5s both; }
    .mf-role { flex:1; border:none; background:transparent; font-family:'Tajawal',sans-serif; font-size:11px; font-weight:700; color:rgba(201,168,76,0.45); padding:8px 4px; cursor:pointer; transition:all 0.25s; letter-spacing:0.5px; border-left:1px solid rgba(201,168,76,0.1); }
    .mf-role:last-child { border-left:none; }
    .mf-role.active { background:rgba(201,168,76,0.12); color:#c9a84c; font-weight:900; }
    .mf-role:hover:not(.active) { color:rgba(201,168,76,0.7); }

    /* Fields */
    .mf-field { margin-bottom:14px; }
    .mf-label { display:block; font-size:9px; font-weight:900; color:rgba(201,168,76,0.5); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
    .mf-iw { position:relative; }
    .mf-icon { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:14px; opacity:0.4; pointer-events:none; }
    .mf-input { width:100%; padding:11px 38px 11px 12px; background:#070710; border:1px solid rgba(201,168,76,0.22); color:#c9a84c; font-family:'Tajawal',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .mf-input::placeholder { color:rgba(201,168,76,0.2); }
    .mf-input:focus { border-color:rgba(201,168,76,0.6); box-shadow:0 0 0 3px rgba(201,168,76,0.07),inset 0 0 10px rgba(201,168,76,0.03); }
    .pw-toggle { position:absolute; left:10px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:13px; opacity:0.35; cursor:pointer; color:#c9a84c; padding:2px; transition:opacity 0.2s; }
    .pw-toggle:hover { opacity:0.7; }

    /* Login button */
    .mf-btn { width:100%; padding:13px; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.5); color:#c9a84c; font-family:'Playfair Display',serif; font-size:14px; font-weight:700; letter-spacing:3px; cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden; margin-top:4px; text-transform:uppercase; }
    .mf-btn:hover { background:rgba(201,168,76,0.18); border-color:#c9a84c; box-shadow:0 0 20px rgba(201,168,76,0.15),inset 0 0 20px rgba(201,168,76,0.05); letter-spacing:4px; }
    .mf-btn:active { transform:scale(0.99); }
    .mf-btn:disabled { opacity:0.5; cursor:not-allowed; letter-spacing:2px; }

    /* Error */
    .mf-err { display:none; margin-top:10px; padding:9px 12px; border:1px solid rgba(180,30,30,0.4); background:rgba(120,10,10,0.2); color:#e88; font-size:12px; text-align:center; letter-spacing:0.5px; }

    /* Separator */
    .mf-sep { display:flex; align-items:center; gap:8px; margin:14px 0; color:rgba(201,168,76,0.25); font-size:10px; letter-spacing:2px; }
    .mf-sep::before, .mf-sep::after { content:''; flex:1; height:1px; background:rgba(201,168,76,0.15); }

    /* Customer link */
    .mf-cust { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1px solid rgba(201,168,76,0.15); background:rgba(201,168,76,0.03); cursor:pointer; transition:all 0.22s; text-decoration:none; }
    .mf-cust:hover { border-color:rgba(201,168,76,0.35); background:rgba(201,168,76,0.07); }
    .mf-cust-ico { width:32px; height:32px; border:1px solid rgba(201,168,76,0.35); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; color:#c9a84c; }
    .mf-cust-txt { flex:1; }
    .mf-cust-main { font-size:12px; font-weight:900; color:#c9a84c; letter-spacing:0.5px; }
    .mf-cust-sub { font-size:10px; color:rgba(201,168,76,0.4); margin-top:1px; letter-spacing:0.3px; }
    .mf-cust-arr { color:rgba(201,168,76,0.5); font-size:12px; }

    /* Footer */
    .mf-footer { text-align:center; margin-top:18px; font-size:9px; color:rgba(201,168,76,0.25); letter-spacing:2px; text-transform:uppercase; }
    .mf-footer-line { width:60px; height:1px; background:rgba(201,168,76,0.15); margin:6px auto 0; }

    /* Success state */
    .mf-success { display:none; text-align:center; padding:20px; color:#c9a84c; }
    .mf-success-icon { font-size:36px; margin-bottom:10px; }
    .mf-success-txt { font-family:'Playfair Display',serif; font-size:16px; letter-spacing:3px; }

    /* Theme float button */
    .theme-float { position:fixed; top:16px; left:16px; z-index:9999; padding:7px 14px; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.25); border-radius:30px; color:#c9a84c; font-family:'Tajawal',sans-serif; font-size:11px; font-weight:700; cursor:pointer; backdrop-filter:blur(12px); transition:.22s; letter-spacing:1px; }
    .theme-float:hover { background:rgba(201,168,76,0.16); border-color:rgba(201,168,76,0.5); }
  </style>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('nexbank-theme') || 'dark')</script>

<!-- Theme toggle -->
<button class="theme-float" id="themeBtn" onclick="toggleTheme()">&#x1F319; داكن</button>

<script>
  /* Password toggle */
  let pwVisible = false;
  function togglePw() {
    pwVisible = !pwVisible;
    document.getElementById('mf-pw').type = pwVisible ? 'text' : 'password';
    document.getElementById('pw-btn').innerHTML = pwVisible ? '&#x1F648;' : '&#x1F441;';
    document.getElementById('pw-btn').style.opacity = pwVisible ? '0.7' : '0.35';
  }

  /* Role selector */
  function setRole(btn) {
    document.querySelectorAll('.mf-role').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  /* Login */
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  async function doLogin() {
    const u = document.getElementById('mf-user').value.trim();
    const p = document.getElementById('mf-pw').value.trim();
    const err = document.getElementById('mf-err');
    if (!u || !p) {
      err.textContent = 'من فضلك أدخل بياناتك';
      err.style.display = 'block';
      return;
    }
    err.style.display = 'none';
    const btn = document.getElementById('mf-login-btn');
    btn.disabled = true;
    document.getElementById('mf-btn-txt').textContent = 'VERIFYING...';
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const d = await res.json();
      if (d.success) {
        document.getElementById('mf-form-wrap').style.display = 'none';
        document.getElementById('mf-success').style.display = 'block';
        setTimeout(() => location.href = d.redirect || '/', 1000);
      } else {
        err.textContent = d.error || 'خطأ في تسجيل الدخول';
        err.style.display = 'block';
        btn.disabled = false;
        document.getElementById('mf-btn-txt').textContent = 'ENTER';
      }
    } catch {
      err.textContent = 'خطأ في الاتصال بالسيرفر';
      err.style.display = 'block';
      btn.disabled = false;
      document.getElementById('mf-btn-txt').textContent = 'ENTER';
    }
  }

  /* Rain animation */
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  let drops = [], W, H;
  function initRain() {
    W = canvas.offsetWidth; H = canvas.offsetHeight;
    canvas.width = W; canvas.height = H;
    drops = [];
    const count = Math.floor(W / 5);
    for (let i = 0; i < count; i++) {
      drops.push({ x: Math.random() * W, y: Math.random() * H, len: Math.random() * 14 + 8, speed: Math.random() * 3 + 3, opacity: Math.random() * 0.25 + 0.08 });
    }
  }
  function drawRain() {
    ctx.clearRect(0, 0, W, H);
    drops.forEach(d => {
      ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - d.len * 0.15, d.y + d.len);
      ctx.strokeStyle = `rgba(140,160,200,${d.opacity})`; ctx.lineWidth = 0.6; ctx.stroke();
      d.y += d.speed; d.x -= d.speed * 0.15;
      if (d.y > H) { d.y = -d.len; d.x = Math.random() * W; }
      if (d.x < 0) d.x = W;
    });
    requestAnimationFrame(drawRain);
  }
  initRain(); drawRain();
  window.addEventListener('resize', initRain);

  /* i18n labels */
  window.PAGE_LANG = {
    ar: { lbl_user:'الهوية الرقمية', lbl_pass:'رمز الوصول', ph_user:'اسم المستخدم', ph_pass:'كلمة المرور', btn_login:'ENTER', role0:'المدير', role1:'مشرف فرع', role2:'موظف', themeLight:'فاتح', themeDark:'داكن' },
    en: { lbl_user:'Digital Identity', lbl_pass:'Access Code', ph_user:'Username', ph_pass:'Password', btn_login:'ENTER', role0:'Manager', role1:'Branch Supervisor', role2:'Staff', themeLight:'Light', themeDark:'Dark' }
  };
</script>
<script src="/shared/theme.js"></script>
<script src="/shared/i18n.js"></script>
</body>
