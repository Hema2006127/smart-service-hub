<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البنك الذكي — دخول آمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --rc:#1a56db;--rg:rgba(26,86,219,.14);--rp:rgba(26,86,219,.08);
  --rs:rgba(26,86,219,.35);--rsh:rgba(26,86,219,.55);
  --gold:#f59e0b;
}
/* overflow:hidden keeps the vault scene clipped; .page handles inner scroll */
html{width:100%;height:100%;overflow:hidden}
body{width:100%;height:100%;overflow:hidden}
@media(max-width:479px){
  /* Allow vertical scroll on tiny phones so card is always reachable */
  html,body{overflow-y:auto;height:auto;min-height:100%}
}
body{font-family:'Tajawal',sans-serif;background:#020c1a;color:#fff}

/* ═══════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════ */
@keyframes fadeUp   {from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink    {0%,100%{opacity:1}50%{opacity:.15}}
@keyframes spin     {to{transform:rotate(360deg)}}
@keyframes ripple   {to{transform:scale(3.5);opacity:0}}
@keyframes pFloat   {0%,100%{transform:translateY(0) scale(1);opacity:.25}50%{transform:translateY(-55px) scale(1.7);opacity:.6}}
@keyframes scanLine {0%{top:-2%}100%{top:102%}}
@keyframes symFloat {0%,100%{transform:translateY(0) rotate(-4deg);opacity:.07}50%{transform:translateY(-30px) rotate(5deg);opacity:.14}}
@keyframes vrSpin   {from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes vrSpinR  {from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(-360deg)}}
@keyframes shimmer  {0%,55%{transform:translateX(-160%)}100%{transform:translateX(240%)}}
@keyframes glowPulse{0%,100%{opacity:.35;filter:blur(8px)}50%{opacity:.85;filter:blur(14px)}}
@keyframes iconBnc  {0%,100%{transform:scale(1) rotate(0)}45%{transform:scale(1.13) rotate(-7deg)}}
@keyframes arrSlide {0%,100%{transform:translateX(0);opacity:.9}50%{transform:translateX(-7px);opacity:.4}}
@keyframes btnGlow  {0%,100%{box-shadow:0 0 22px var(--rs),0 0 45px rgba(0,0,0,0)}50%{box-shadow:0 0 35px var(--rsh),0 0 70px var(--rs)}}
@keyframes vaultGlow{0%,100%{box-shadow:0 0 60px rgba(26,86,219,.3),0 0 120px rgba(26,86,219,.15),inset 0 0 40px rgba(26,86,219,.1)}
                     50%{box-shadow:0 0 80px rgba(26,86,219,.5),0 0 160px rgba(26,86,219,.25),inset 0 0 60px rgba(26,86,219,.18)}}
@keyframes goldGlow {0%,100%{box-shadow:0 0 20px rgba(245,158,11,.4),0 0 40px rgba(245,158,11,.2)}
                     50%{box-shadow:0 0 35px rgba(245,158,11,.7),0 0 70px rgba(245,158,11,.35)}}
@keyframes handleRot{0%,85%,100%{transform:rotate(0deg)}90%{transform:rotate(-12deg)}95%{transform:rotate(5deg)}}
@keyframes floorShine{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes panelGlow{0%,100%{border-color:rgba(26,86,219,.2);box-shadow:0 0 20px rgba(26,86,219,.05)}
                     50%{border-color:rgba(26,86,219,.5);box-shadow:0 0 40px rgba(26,86,219,.2)}}
@keyframes symPulse {0%,100%{opacity:.55;text-shadow:0 0 20px currentColor}50%{opacity:1;text-shadow:0 0 40px currentColor,0 0 80px currentColor}}
@keyframes barAnim  {0%{height:30%}50%{height:100%}100%{height:30%}}
@keyframes chartPulse{0%,100%{opacity:.7}50%{opacity:1}}

/* ═══════════════════════════════════════
   SCENE — VAULT ROOM
═══════════════════════════════════════ */
.scene{
  position:fixed;inset:0;z-index:0;
  perspective:1200px;
  overflow:hidden;
}

/* ── Room base gradient ── */
.room-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, #0a1e3d 0%, #030d1e 50%, #020810 100%);
}

/* ── CEILING ── */
.ceiling{
  position:absolute;top:0;left:0;right:0;
  height:35%;
  background:linear-gradient(180deg, #0a1628 0%, #071020 100%);
  transform-origin:top center;
  transform:perspective(1000px) rotateX(-8deg);
}
.ceiling-strip{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,.6),rgba(245,158,11,.8),rgba(245,158,11,.6),transparent);
  box-shadow:0 0 20px rgba(245,158,11,.4);
}
/* Ceiling recessed lights */
.ceil-light{
  position:absolute;top:15%;
  width:80px;height:4px;border-radius:2px;
  background:rgba(245,158,11,.7);
  box-shadow:0 0 15px rgba(245,158,11,.5),0 8px 30px rgba(245,158,11,.2);
}
.cl1{left:12%}
.cl2{left:calc(50% - 40px)}
.cl3{right:12%}

/* ── FLOOR ── */
.floor{
  position:absolute;bottom:0;left:-30%;right:-30%;
  height:42%;
  transform:perspective(800px) rotateX(55deg);
  transform-origin:bottom center;
}
.floor-tiles{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(26,86,219,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,86,219,.1) 1px,transparent 1px),
    linear-gradient(rgba(245,158,11,.04) 2px,transparent 2px),
    linear-gradient(90deg,rgba(245,158,11,.04) 2px,transparent 2px);
  background-size:80px 80px, 80px 80px, 320px 320px, 320px 320px;
}
.floor-reflection{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(26,86,219,.25) 0%, transparent 60%);
  animation:floorShine 4s ease-in-out infinite;
}
.floor-vignette{
  position:absolute;inset:0;
  background:linear-gradient(to top,#020810 0%,transparent 50%);
}

/* ── BACK WALL ── */
.back-wall{
  position:absolute;
  top:0;left:0;right:0;bottom:30%;
  background:linear-gradient(180deg, #071828 0%, #04101e 100%);
}
.wall-panels{
  position:absolute;inset:0;
  display:flex;
}
/* Left wall panel decorative lines */
.wall-left-panel{
  position:absolute;left:0;top:0;bottom:0;
  width:25%;
  background:linear-gradient(90deg,#050e1e,#071525);
  border-right:1px solid rgba(245,158,11,.15);
  transform-origin:left center;
  transform:perspective(800px) rotateY(15deg);
}
.wall-right-panel{
  position:absolute;right:0;top:0;bottom:0;
  width:25%;
  background:linear-gradient(270deg,#050e1e,#071525);
  border-left:1px solid rgba(245,158,11,.15);
  transform-origin:right center;
  transform:perspective(800px) rotateY(-15deg);
}
/* Wall accent lines */
.wall-line{
  position:absolute;
  background:rgba(245,158,11,.2);
}
/* Horizontal accent lines on back wall */
.wl-h1{top:25%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,.25),transparent)}
.wl-h2{top:60%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,.15),transparent)}
/* Vertical accent lines */
.wl-v1{top:0;bottom:0;left:22%;width:1px;background:linear-gradient(180deg,transparent,rgba(245,158,11,.2),transparent)}
.wl-v2{top:0;bottom:0;right:22%;width:1px;background:linear-gradient(180deg,transparent,rgba(245,158,11,.2),transparent)}

/* ── VAULT DOOR — THE HERO ELEMENT ── */
.vault-container{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-46%);
  width:280px;height:280px;
  z-index:5;
}

/* Vault frame / embrasure */
.vault-frame{
  position:absolute;
  top:-28px;left:-28px;right:-28px;bottom:-28px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 25%, #1a3a5a, #0d2035 40%, #06111f 100%);
  border:6px solid;
  border-color:#1a3a5a #0d2035 #0d2035 #1a3a5a;
  box-shadow:
    0 0 0 3px rgba(245,158,11,.3),
    0 0 0 6px rgba(26,86,219,.15),
    0 0 60px rgba(26,86,219,.4),
    0 0 120px rgba(26,86,219,.2),
    inset 0 0 30px rgba(0,0,0,.6);
  animation:vaultGlow 4s ease-in-out infinite;
}

/* Vault door main body */
.vault-door{
  position:absolute;inset:0;
  border-radius:50%;
  background:
    radial-gradient(circle at 32% 28%,#2a4a6e 0%,#1a3050 25%,#0e1e35 55%,#080e1e 100%);
  border:4px solid;
  border-color:#2a4a6e #0d1e35 #0d1e35 #2a4a6e;
  overflow:hidden;
  box-shadow:
    inset -15px -15px 30px rgba(0,0,0,.5),
    inset 8px 8px 20px rgba(96,165,250,.08);
}

/* Vault door metallic sheen */
.vault-door::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 25%,rgba(96,165,250,.12) 0%,transparent 50%),
    repeating-conic-gradient(from 0deg,transparent 0deg 8deg,rgba(255,255,255,.015) 8deg 10deg);
  border-radius:50%;
}

/* Vault concentric rings */
.vault-ring{
  position:absolute;border-radius:50%;border:2px solid;
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.vring1{
  width:90%;height:90%;
  border-color:rgba(245,158,11,.5) rgba(245,158,11,.2) rgba(245,158,11,.2) rgba(245,158,11,.5);
  box-shadow:0 0 8px rgba(245,158,11,.2),inset 0 0 8px rgba(245,158,11,.1);
  animation:vrSpin 25s linear infinite;
}
.vring2{
  width:72%;height:72%;
  border-color:rgba(96,165,250,.4) rgba(96,165,250,.15) rgba(96,165,250,.15) rgba(96,165,250,.4);
  box-shadow:0 0 6px rgba(96,165,250,.2);
  animation:vrSpinR 18s linear infinite;
}
.vring3{
  width:54%;height:54%;
  border-color:rgba(245,158,11,.35) rgba(245,158,11,.1) rgba(245,158,11,.1) rgba(245,158,11,.35);
  animation:vrSpin 12s linear infinite;
}
.vring4{
  width:37%;height:37%;
  border-color:rgba(96,165,250,.5) rgba(96,165,250,.2) rgba(96,165,250,.2) rgba(96,165,250,.5);
  animation:vrSpinR 8s linear infinite;
}

/* Vault ring tick marks (bolts/spokes) */
.vault-bolts{
  position:absolute;inset:0;
  animation:vrSpin 30s linear infinite;
}
.bolt{
  position:absolute;
  width:10px;height:10px;
  border-radius:50%;
  background:radial-gradient(circle,#c9973a,#7a5010);
  border:1px solid rgba(245,158,11,.5);
  box-shadow:0 0 6px rgba(245,158,11,.4);
  top:50%;left:50%;
  transform-origin:0 0;
}

/* Center hub */
.vault-hub{
  position:absolute;top:50%;left:50%;
  width:48px;height:48px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#3a6090,#1a3558,#0d1e35);
  border:3px solid rgba(245,158,11,.6);
  box-shadow:0 0 15px rgba(245,158,11,.4),inset 0 0 10px rgba(0,0,0,.5);
  z-index:10;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}

/* Vault handle */
.vault-handle-wrap{
  position:absolute;
  top:50%;right:-20px;
  transform:translateY(-50%);
  width:40px;height:100px;
  z-index:11;
  animation:handleRot 6s ease-in-out infinite;
  transform-origin:20px 50%;
}
.vault-handle{
  position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:14px;height:90px;
  background:linear-gradient(90deg,#3a6090,#1a3558,#3a6090);
  border-radius:7px;
  border:1px solid rgba(245,158,11,.4);
  box-shadow:2px 0 8px rgba(0,0,0,.4);
}
.vault-handle::before,.vault-handle::after{
  content:'';position:absolute;
  width:30px;height:14px;border-radius:7px;
  left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#3a6090,#1a3558);
  border:1px solid rgba(245,158,11,.4);
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.vault-handle::before{top:4px}
.vault-handle::after{bottom:4px}

/* Vault edge shadow (door depth) */
.vault-depth{
  position:absolute;
  top:50%;left:50%;
  width:290px;height:290px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:transparent;
  box-shadow:
    8px 8px 0 rgba(0,0,0,.4),
    12px 12px 0 rgba(0,0,0,.25),
    16px 16px 0 rgba(0,0,0,.1);
  z-index:4;pointer-events:none;
}

/* ── DISPLAY PANELS (left & right walls) ── */
.display-panel{
  position:absolute;top:10%;
  width:200px;height:65%;
  background:rgba(4,12,28,.88);
  border:1px solid rgba(26,86,219,.3);
  border-radius:8px;
  padding:18px 14px;
  display:flex;flex-direction:column;gap:14px;
  animation:panelGlow 4s ease-in-out infinite;
  backdrop-filter:blur(8px);
  z-index:6;
  overflow:hidden;
}
.dp-left{left:2%}
.dp-right{right:2%}
.display-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(26,86,219,.6),rgba(245,158,11,.4),transparent);
}
/* Scanline on panel */
.display-panel::after{
  content:'';position:absolute;
  left:0;right:0;height:30%;
  background:linear-gradient(180deg,transparent,rgba(26,86,219,.04),transparent);
  animation:scanLine 6s linear infinite;
  pointer-events:none;
}
.dp-header{
  font-size:9px;font-weight:800;letter-spacing:2px;
  color:rgba(245,158,11,.7);text-transform:uppercase;
  border-bottom:1px solid rgba(245,158,11,.15);
  padding-bottom:8px;
}
.dp-item{
  display:flex;align-items:center;gap:10px;
  padding:6px 8px;
  background:rgba(26,86,219,.06);
  border:1px solid rgba(26,86,219,.12);
  border-radius:6px;
  transition:background .3s;
}
.dp-item:hover{background:rgba(26,86,219,.12)}
.dp-ico{
  width:28px;height:28px;border-radius:7px;
  background:rgba(26,86,219,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.dp-lbl{font-size:9px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.4px}
.dp-val{font-size:13px;font-weight:700;color:#fff;margin-top:1px}

/* Fingerprint on left panel */
.fingerprint{
  width:60px;height:60px;border-radius:50%;
  margin:0 auto 4px;
  background:
    repeating-radial-gradient(
      circle at center,
      transparent 0px, transparent 4px,
      rgba(96,165,250,.15) 4px, rgba(96,165,250,.15) 5px
    );
  border:1px solid rgba(96,165,250,.2);
  position:relative;overflow:hidden;
  animation:panelGlow 3s ease-in-out infinite;
}
.fingerprint::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(96,165,250,.1) 0%,transparent 60%);
  border-radius:50%;
}

/* Bar chart */
.bar-chart{
  display:flex;align-items:flex-end;gap:4px;
  height:55px;padding:0 4px;
  border-bottom:1px solid rgba(245,158,11,.15);
}
.bc-bar{
  flex:1;border-radius:3px 3px 0 0;
  background:linear-gradient(to top,rgba(245,158,11,.8),rgba(245,158,11,.2));
  animation:barAnim var(--d) var(--dl) ease-in-out infinite;
}

/* ── FINANCIAL SYMBOLS FLOATING ── */
.fin-sym{
  position:absolute;z-index:4;
  font-weight:900;
  animation:symFloat var(--d) var(--dl) ease-in-out infinite;
  pointer-events:none;
}
/* Left wall symbols */
.sym-dollar{top:28%;left:6%;font-size:64px;color:rgba(96,165,250,.55);text-shadow:0 0 30px rgba(96,165,250,.4);animation:symPulse 4s ease-in-out infinite,symFloat 9s 0s ease-in-out infinite}
.sym-euro  {top:22%;right:6%;font-size:60px;color:rgba(245,158,11,.6);text-shadow:0 0 30px rgba(245,158,11,.4);animation:symPulse 5s ease-in-out infinite,symFloat 11s -4s ease-in-out infinite}
.sym-yen   {bottom:25%;right:8%;font-size:50px;color:rgba(245,158,11,.5);text-shadow:0 0 25px rgba(245,158,11,.3);animation:symPulse 3.5s ease-in-out infinite,symFloat 8s -6s ease-in-out infinite}
.sym-btc   {bottom:28%;left:7%;font-size:44px;color:rgba(96,165,250,.45);text-shadow:0 0 20px rgba(96,165,250,.3);animation:symPulse 4.5s ease-in-out infinite,symFloat 10s -2s ease-in-out infinite}
/* 3D gem / diamond shape on left */
.sym-gem   {top:42%;left:5.5%;font-size:36px;animation:symFloat 12s -8s ease-in-out infinite;opacity:.5}

/* ── AMBIENT ORBS ── */
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1}
.o1{width:500px;height:400px;background:rgba(26,86,219,.18);top:-150px;left:-150px}
.o2{width:350px;height:350px;background:rgba(245,158,11,.08);bottom:-100px;right:-100px}
.o3{width:250px;height:250px;background:rgba(13,148,136,.06);top:35%;right:5%}

/* ── SCAN LINE ── */
.scan-line{
  position:absolute;left:0;right:0;height:2px;z-index:8;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(96,165,250,.25),rgba(96,165,250,.1),transparent);
  animation:scanLine 16s linear infinite;
}

/* ── PARTICLES ── */
.particles{position:absolute;inset:0;z-index:3;overflow:hidden;pointer-events:none}
.particle{position:absolute;border-radius:50%;animation:pFloat var(--d) var(--dl) ease-in-out infinite}

/* ── RECEPTION DESK (subtle, bottom) ── */
.reception{
  position:absolute;bottom:18%;left:50%;transform:translateX(-50%);
  width:320px;height:55px;z-index:4;
  background:linear-gradient(180deg,#0d2035,#071525);
  border-radius:50% 50% 0 0 / 30px 30px 0 0;
  border-top:2px solid rgba(245,158,11,.25);
  box-shadow:0 -5px 30px rgba(26,86,219,.15);
}
.reception::before{
  content:'';position:absolute;
  top:-2px;left:20%;right:20%;height:2px;
  background:rgba(245,158,11,.5);
  box-shadow:0 0 10px rgba(245,158,11,.4);
}

/* ── SPOTLIGHT CONE FROM CEILING ── */
.spotlight-cone{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:150px solid transparent;
  border-right:150px solid transparent;
  border-top:280px solid rgba(245,158,11,.04);
  z-index:2;pointer-events:none;
}
.spotlight-cone2{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:220px solid transparent;
  border-right:220px solid transparent;
  border-top:350px solid rgba(26,86,219,.05);
  z-index:2;pointer-events:none;
}

/* ═══════════════════════════════════════
   PAGE CONTENT
═══════════════════════════════════════ */
.page{
  position:relative;z-index:10;
  min-height:100vh;   /* min- lets page grow on tiny screens */
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 16px;
  gap:14px;
  overflow-y:auto;
}

/* Hero title */
.hero{text-align:center;animation:fadeUp .7s .05s both}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(26,86,219,.12);border:1px solid rgba(26,86,219,.25);
  border-radius:30px;padding:5px 16px;margin-bottom:12px;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--rc);animation:blink 2s infinite;flex-shrink:0}
.hero-badge span{font-size:10px;font-weight:800;color:var(--rc);letter-spacing:.9px}
.hero-title{
  font-size:clamp(24px,4vw,40px);font-weight:900;color:#fff;line-height:1.2;
  margin-bottom:7px;
  text-shadow:0 0 50px rgba(59,130,246,.4),0 0 100px rgba(59,130,246,.15);
  text-transform:uppercase;letter-spacing:1px;
}
.hero-title .hl{
  background:linear-gradient(90deg,#93c5fd,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:12px;color:rgba(255,255,255,.32);letter-spacing:.6px}

/* ── CARD ── */
.card{
  width:440px;max-width:94vw;
  background:rgba(2,8,20,.85);
  backdrop-filter:blur(35px);-webkit-backdrop-filter:blur(35px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:30px 36px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04),
    0 28px 80px rgba(0,0,0,.7),
    0 0 80px rgba(26,86,219,.08);
  animation:fadeUp .7s .14s both;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(96,165,250,.4),rgba(245,158,11,.25),transparent);
}

/* Roles */
.roles{
  display:flex;gap:3px;background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;
  padding:4px;margin-bottom:18px;position:relative;
  animation:fadeUp .6s .22s both;
}
.role-indicator{
  position:absolute;top:4px;height:calc(100% - 8px);
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:9px;box-shadow:0 2px 10px rgba(0,0,0,.3);
  transition:left .32s cubic-bezier(.4,0,.2,1),width .32s;
  pointer-events:none;z-index:0;
}
.role-btn{
  flex:1;border:none;background:transparent;color:rgba(255,255,255,.38);
  padding:9px 4px;border-radius:9px;font-family:inherit;
  font-weight:700;cursor:pointer;font-size:13px;
  transition:color .25s;position:relative;z-index:1;
}
.role-btn.active{color:#fff}
.role-btn:hover:not(.active){color:rgba(255,255,255,.65)}

/* Form groups */
.fg{margin-bottom:13px}
#fgU{animation:fadeUp .6s .3s both}
#fgP{animation:fadeUp .6s .38s both}
.fg label{display:block;font-size:10px;font-weight:800;color:rgba(255,255,255,.38);margin-bottom:6px;letter-spacing:.5px}
.iw{position:relative}
.ii{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.28;pointer-events:none;transition:opacity .25s}
input{
  width:100%;padding:13px 42px 13px 13px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:12px;color:#fff;font-family:inherit;font-size:14px;
  outline:none;transition:border-color .25s,background .25s,box-shadow .25s;
}
input::placeholder{color:rgba(255,255,255,.22)}
input:focus{border-color:var(--rc);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px var(--rg),0 2px 16px rgba(0,0,0,.2)}
.iw:focus-within .ii{opacity:.65}
#pw{padding-left:42px}
.pw-btn{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:14px;opacity:.28;
  padding:2px;transition:opacity .2s;color:#fff;
}
.pw-btn:hover{opacity:.7}
.pw-btn.on{opacity:.72}

/* ── LOGIN BUTTON ── */
.btn-login{
  width:100%;padding:15px 24px;border-radius:50px;
  background:var(--rp);color:#fff;border:1.5px solid var(--rc);
  font-family:inherit;font-weight:900;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .22s,background .3s,border-color .3s;
  margin-top:6px;letter-spacing:.5px;
  animation:fadeUp .6s .46s both, btnGlow 3s ease-in-out 1.5s infinite;
  position:relative;overflow:hidden;
}
.btn-login::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);
  transform:translateX(-100%);
}
.btn-login:hover:not(:disabled)::after{transform:translateX(100%);transition:transform .45s}
.btn-login:hover:not(:disabled){transform:translateY(-2px)}
.btn-login:active:not(:disabled){transform:translateY(0) scale(.98)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;animation:none}
.btn-login .ripple-el{position:absolute;border-radius:50%;background:rgba(255,255,255,.22);transform:scale(0);animation:ripple .55s linear;pointer-events:none}
.spinner{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;animation:spin .65s linear infinite;display:none;flex-shrink:0}
.err{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:10px 14px;border-radius:11px;font-size:13px;margin-top:11px;display:none;text-align:center}

/* ── CUSTOMER BUTTON ── */
.cust-wrap{margin-top:12px;position:relative;animation:fadeUp .6s .56s both}
.cust-wrap::before{
  content:'';position:absolute;inset:-3px;border-radius:21px;
  background:linear-gradient(135deg,#059669,#0d9488,#2563eb);
  opacity:0;filter:blur(10px);
  animation:glowPulse 3.2s ease-in-out infinite;z-index:0;
}
.cust-card{
  display:flex;align-items:center;gap:13px;
  padding:13px 16px;text-decoration:none;
  border-radius:18px;position:relative;overflow:hidden;
  transition:transform .26s cubic-bezier(.16,1,.3,1),box-shadow .28s;z-index:1;
  background:linear-gradient(rgba(4,9,22,.9),rgba(4,9,22,.9)) padding-box,
             linear-gradient(135deg,#059669 0%,#0d9488 50%,#2563eb 100%) border-box;
  border:2px solid transparent;
  box-shadow:0 4px 24px rgba(13,148,136,.15);
}
.cust-card:hover{transform:translateY(-3px) scale(1.015);box-shadow:0 10px 40px rgba(13,148,136,.32)}
.cust-card:active{transform:translateY(0) scale(.99)}
.cust-shine{position:absolute;inset:0;pointer-events:none;background:linear-gradient(110deg,transparent 25%,rgba(13,148,136,.14) 50%,transparent 75%);transform:translateX(-160%);animation:shimmer 3.8s ease-in-out 1.2s infinite}
.cust-ico{width:46px;height:46px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,#059669,#0d9488);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 16px rgba(5,150,105,.3);animation:iconBnc 3.2s ease-in-out infinite}
.cust-txt{flex:1;display:flex;flex-direction:column;gap:2px}
.cust-main{font-size:14px;font-weight:900;color:#fff}
.cust-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:500}
.cust-arr{display:flex;flex-direction:column;align-items:center;gap:1px;animation:arrSlide 1.9s ease-in-out infinite}
.cust-arr span{display:block;width:6px;height:6px;border-right:2.5px solid #34d399;border-bottom:2.5px solid #34d399;transform:rotate(135deg);margin-top:-3px}
.cust-arr span:nth-child(2){opacity:.5}
.cust-arr span:nth-child(3){opacity:.18}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE — Mobile-first strategy
   Breakpoints: 320px | 480px | 768px | 1024px | 1440px
   The vault scene is decorative; card + hero are the content layer.
═══════════════════════════════════════════════════════════════ */

/* ── <1100px: hide decorative side panels (SECURE VAULT / LIVE MARKET) ── */
@media(max-width:1099px){
  .display-panel{display:none}
}

/* ── <768px: scale vault, hide overlapping symbols ── */
@media(max-width:767px){
  /* Scale vault door down so it doesn't overpower the card */
  .vault-container{width:200px;height:200px;transform:translate(-50%,-44%)}
  .vault-depth{width:210px;height:210px}
  .vault-hub{width:36px;height:36px;font-size:14px}

  /* Financial symbols ($ € ¥ ₿) would overlap card on narrow screens */
  .fin-sym{display:none}

  /* Shrink reception desk */
  .reception{width:200px;height:40px}

  .page{gap:10px;padding:16px 12px}
  .hero-title{font-size:clamp(20px,5vw,34px)}
}

/* ── <520px: compact card ── */
@media(max-width:519px){
  .card{padding:22px 16px;border-radius:18px;max-width:96vw}
  .hero-title{font-size:clamp(18px,5.5vw,26px)}
  .hero-sub{font-size:10px;letter-spacing:.3px}
  .roles{margin-bottom:14px}
  .role-btn{padding:7px 2px;font-size:12px}
  .btn-login{padding:13px 20px;font-size:14px}
  .cust-card{padding:11px 13px}
  .cust-ico{width:38px;height:38px;font-size:18px;border-radius:10px}
  .cust-main{font-size:13px}
  .cust-sub{font-size:10px}
  input{font-size:13px;padding:12px 38px 12px 12px}
}

/* ── <480px: small phones ── */
@media(max-width:479px){
  .vault-container{width:160px;height:160px;transform:translate(-50%,-42%)}
  .vault-depth{width:168px;height:168px}
  /* Bolt positions are hard-coded for 280px — hide on scaled-down vault */
  .vault-bolts{display:none}
  .ceiling{height:22%}
  .floor{height:30%}

  .page{padding:12px 10px;gap:8px}
  .hero-badge{padding:4px 12px}
  .hero-badge span{font-size:9px}
  .hero-title{font-size:clamp(16px,5vw,22px)}

  .card{
    width:100%;
    max-width:96vw;
    padding:18px 14px;
    border-radius:16px;
  }
  .roles{padding:3px}
  .role-btn{font-size:11px;padding:7px 2px}
  input{padding:11px 36px 11px 11px;font-size:13px}
  .btn-login{padding:12px;font-size:14px}
  .cust-card{padding:10px 12px;gap:10px}
  .cust-ico{width:36px;height:36px;font-size:16px;border-radius:9px}
  .cust-main{font-size:12px}
  .cust-sub{font-size:9px}
  .cust-arr span{width:5px;height:5px}
}

/* ── 320px edge: minimal card ── */
@media(max-width:330px){
  .card{padding:14px 10px;border-radius:14px}
  .hero-title{font-size:16px}
  .hero-badge{display:none}
  .roles{flex-wrap:nowrap}
  .role-btn{font-size:10px}
}

/* ── Height-based: hide hero on short screens, tighten on very short ── */
@media(max-height:680px){.hero{display:none}}
@media(max-height:500px){.page{padding:6px;gap:4px}}
</style>
</head>
<body>

<!-- ═══ SCENE ═══ -->
<div class="scene">
  <div class="room-bg"></div>

  <!-- Spotlights from ceiling -->
  <div class="spotlight-cone2"></div>
  <div class="spotlight-cone"></div>

  <!-- Ceiling -->
  <div class="ceiling">
    <div class="ceiling-strip"></div>
    <div class="ceil-light cl1"></div>
    <div class="ceil-light cl2"></div>
    <div class="ceil-light cl3"></div>
  </div>

  <!-- Back wall with panels -->
  <div class="back-wall">
    <div class="wall-left-panel"></div>
    <div class="wall-right-panel"></div>
    <div class="wall-line wl-h1"></div>
    <div class="wall-line wl-h2"></div>
    <div class="wall-line wl-v1"></div>
    <div class="wall-line wl-v2"></div>
  </div>

  <!-- Floor -->
  <div class="floor">
    <div class="floor-tiles"></div>
    <div class="floor-reflection"></div>
    <div class="floor-vignette"></div>
  </div>

  <!-- Reception desk -->
  <div class="reception"></div>

  <!-- ═══ VAULT DOOR ═══ -->
  <div class="vault-container">
    <div class="vault-depth"></div>
    <div class="vault-frame">
      <div class="vault-door">
        <!-- Metallic rings -->
        <div class="vault-bolts" id="vaultBolts"></div>
        <div class="vault-ring vring1"></div>
        <div class="vault-ring vring2"></div>
        <div class="vault-ring vring3"></div>
        <div class="vault-ring vring4"></div>
        <!-- Center hub -->
        <div class="vault-hub">🔐</div>
      </div>
      <!-- Handle -->
      <div class="vault-handle-wrap">
        <div class="vault-handle"></div>
      </div>
    </div>
  </div>

  <!-- ═══ DISPLAY PANELS ═══ -->
  <!-- Left panel -->
  <div class="display-panel dp-left">
    <div class="dp-header">🔒 SECURE VAULT</div>
    <div class="fingerprint"></div>
    <div class="dp-item">
      <div class="dp-ico">🏅</div>
      <div><div class="dp-lbl">GOLD</div><div class="dp-val" style="color:#f59e0b">+٢.٤٪</div></div>
    </div>
    <div class="dp-item">
      <div class="dp-ico">$</div>
      <div><div class="dp-lbl">USD</div><div class="dp-val">٣.٧٢</div></div>
    </div>
    <div class="dp-item">
      <div class="dp-ico">₿</div>
      <div><div class="dp-lbl">CRYPTO</div><div class="dp-val" style="color:#34d399">+٥.١٪</div></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="display-panel dp-right">
    <div class="dp-header">📊 LIVE MARKET</div>
    <div class="fingerprint"></div>
    <div class="dp-item">
      <div class="dp-ico">🏦</div>
      <div><div class="dp-lbl">GOLD</div><div class="dp-val" style="color:#f59e0b">٢,١٨٤</div></div>
    </div>
    <div class="dp-item">
      <div class="dp-ico">📈</div>
      <div><div class="dp-lbl">INDEX</div><div class="dp-val" style="color:#60a5fa">LIVE</div></div>
    </div>
    <div class="bar-chart">
      <div class="bc-bar" style="--d:2.1s;--dl:0s;height:38%"></div>
      <div class="bc-bar" style="--d:2.8s;--dl:-.4s;height:62%"></div>
      <div class="bc-bar" style="--d:2.3s;--dl:-.8s;height:48%"></div>
      <div class="bc-bar" style="--d:3.1s;--dl:-.2s;height:80%"></div>
      <div class="bc-bar" style="--d:2.6s;--dl:-.6s;height:55%"></div>
      <div class="bc-bar" style="--d:2.4s;--dl:-1s;height:70%"></div>
    </div>
  </div>

  <!-- Financial symbols -->
  <span class="fin-sym sym-dollar">$</span>
  <span class="fin-sym sym-euro">€</span>
  <span class="fin-sym sym-yen">¥</span>
  <span class="fin-sym sym-btc">₿</span>
  <span class="fin-sym sym-gem">💎</span>

  <!-- Ambient orbs -->
  <div class="orb o1" id="o1"></div>
  <div class="orb o2" id="o2"></div>
  <div class="orb o3" id="o3"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>
  <div class="scan-line"></div>
</div>

<!-- ═══ PAGE CONTENT ═══ -->
<div class="page">
  <div class="hero">
    <div class="hero-badge">
      <span class="dot"></span>
      <span>SECURE TERMINAL — البنك الذكي</span>
    </div>
    <h1 class="hero-title">خزينتك الرقمية <span class="hl">الآمنة</span></h1>
    <p class="hero-sub">وصول عالمي · حسابات مؤسسية · ودائع آمنة · ذكاء اصطناعي</p>
  </div>

  <div class="card">
    <div class="roles" id="rolesBar">
      <div class="role-indicator" id="roleInd"></div>
      <button class="role-btn active" onclick="selectRole(this,0)">المدير</button>
      <button class="role-btn" onclick="selectRole(this,1)">مشرف فرع</button>
      <button class="role-btn" onclick="selectRole(this,2)">موظف</button>
    </div>

    <div class="fg" id="fgU">
      <label>الهوية الرقمية</label>
      <div class="iw">
        <span class="ii">👤</span>
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="username"/>
      </div>
    </div>

    <div class="fg" id="fgP">
      <label>رمز الوصول</label>
      <div class="iw">
        <span class="ii">🔑</span>
        <input type="password" id="pw" placeholder="كلمة المرور" autocomplete="current-password"/>
        <button class="pw-btn" id="pwBtn" type="button" onclick="togglePw()">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin(event)">
      <div class="spinner" id="spinner"></div>
      <span id="btnTxt">دخول النظام</span>
    </button>
    <div class="err" id="err"></div>

    <div class="cust-wrap">
      <a href="/customer" class="cust-card">
        <div class="cust-shine"></div>
        <div class="cust-ico">🏦</div>
        <div class="cust-txt">
          <span class="cust-main">أنا عميل — ادخل هنا</span>
          <span class="cust-sub">احجز موعد · تابع رقمك · استعلم</span>
        </div>
        <div class="cust-arr">
          <span></span><span></span><span></span>
        </div>
      </a>
    </div>
  </div>
</div>

<script>
/* ── Role themes ── */
const T=[
  {c:'#1a56db',g:'rgba(26,86,219,.14)',p:'rgba(26,86,219,.08)',s:'rgba(26,86,219,.35)',sh:'rgba(26,86,219,.55)'},
  {c:'#0d9488',g:'rgba(13,148,136,.14)',p:'rgba(13,148,136,.08)',s:'rgba(13,148,136,.35)',sh:'rgba(13,148,136,.55)'},
  {c:'#7c3aed',g:'rgba(124,58,237,.14)',p:'rgba(124,58,237,.08)',s:'rgba(124,58,237,.35)',sh:'rgba(124,58,237,.55)'},
];
function applyT(t){
  const r=document.documentElement.style;
  r.setProperty('--rc',t.c);r.setProperty('--rg',t.g);r.setProperty('--rp',t.p);
  r.setProperty('--rs',t.s);r.setProperty('--rsh',t.sh);
}
function moveInd(btn){
  const ind=document.getElementById('roleInd');
  const br=document.getElementById('rolesBar').getBoundingClientRect();
  const r=btn.getBoundingClientRect();
  ind.style.left=(r.left-br.left)+'px';
  ind.style.width=r.width+'px';
}
function selectRole(btn,i){
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');moveInd(btn);applyT(T[i]);
}
window.addEventListener('load',()=>{
  const a=document.querySelector('.role-btn.active');
  if(a)moveInd(a);
  buildVaultBolts();
});

/* ── Vault bolts ── */
function buildVaultBolts(){
  const container=document.getElementById('vaultBolts');
  const cx=140,cy=140,r=128;
  for(let i=0;i<12;i++){
    const angle=(i/12)*Math.PI*2 - Math.PI/2;
    const x=cx + r*Math.cos(angle) - 5;
    const y=cy + r*Math.sin(angle) - 5;
    const b=document.createElement('div');
    b.className='bolt';
    b.style.cssText=`left:${x}px;top:${y}px;transform:none`;
    container.appendChild(b);
  }
}

/* ── Parallax orbs ── */
const oo=[document.getElementById('o1'),document.getElementById('o2'),document.getElementById('o3')];
const fp=[[28,18],[-20,-15],[16,26]];
let raf;
document.addEventListener('mousemove',e=>{
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(()=>{
    const x=e.clientX/window.innerWidth-.5,y=e.clientY/window.innerHeight-.5;
    oo.forEach((o,i)=>{if(o)o.style.transform=`translate(${x*fp[i][0]}px,${y*fp[i][1]}px)`});
  });
});

/* ── Particles ── */
(()=>{
  const c=document.getElementById('particles');
  const cols=['rgba(96,165,250,.45)','rgba(245,158,11,.38)','rgba(52,211,153,.4)','rgba(167,139,250,.32)','rgba(255,255,255,.2)'];
  for(let i=0;i<28;i++){
    const p=document.createElement('span');p.className='particle';
    const s=Math.random()*5+1.5;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${cols[i%cols.length]};--d:${(Math.random()*11+5).toFixed(1)}s;--dl:${(Math.random()*-16).toFixed(1)}s`;
    c.appendChild(p);
  }
})();

/* ── Password toggle ── */
let pwOn=false;
function togglePw(){
  pwOn=!pwOn;
  document.getElementById('pw').type=pwOn?'text':'password';
  const b=document.getElementById('pwBtn');
  b.textContent=pwOn?'🙈':'👁';
  b.classList.toggle('on',pwOn);
}

/* ── Ripple on login btn ── */
document.getElementById('loginBtn').addEventListener('mousedown',function(e){
  const r=document.createElement('span');r.className='ripple-el';
  const rect=this.getBoundingClientRect(),sz=Math.max(rect.width,rect.height)*1.7;
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  this.appendChild(r);r.addEventListener('animationend',()=>r.remove());
});

/* ── Login logic ── */
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
async function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('pw').value.trim();
  document.getElementById('err').style.display='none';
  if(!u||!p){showErr('من فضلك أدخل بياناتك');return;}
  setLoad(true);
  try{
    const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await res.json();
    if(d.success){
      const btn=document.getElementById('loginBtn');
      btn.style.cssText='background:rgba(5,150,105,.2)!important;border-color:#059669!important;animation:none';
      document.getElementById('spinner').style.display='none';
      document.getElementById('btnTxt').textContent='✓ جاري التوجيه...';
      setTimeout(()=>location.href=d.redirect||'/',500);
    }else showErr(d.error||'خطأ في تسجيل الدخول');
  }catch{showErr('خطأ في الاتصال بالسيرفر');}
}
function setLoad(on){
  const btn=document.getElementById('loginBtn');btn.disabled=on;
  document.getElementById('spinner').style.display=on?'block':'none';
  document.getElementById('btnTxt').textContent=on?'جاري التحقق...':'دخول النظام';
}
function showErr(msg){
  const e=document.getElementById('err');e.textContent=msg;e.style.display='block';setLoad(false);
}
</script>
</body>
</html>
